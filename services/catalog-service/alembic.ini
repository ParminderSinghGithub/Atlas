# Alembic Config File

[alembic]
# Path to migration scripts
script_location = alembic

# Template for generating migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend timezone-aware timestamps to migration filenames
# Set to 'true' to use local timezone, 'false' for UTC
timezone = 

# Maximum length of characters to apply to the "slug" field
truncate_slug_length = 40

# Database URL (will be overridden in env.py)
sqlalchemy.url = postgresql://postgres:postgres@db:5432/ecommerce

[post_write_hooks]
# Format generated migration files with Black (optional)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
