services:
  # ---------- BACKEND SERVICES ----------
  user-service:
    build: ../services/user-service
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_URI=postgresql://postgres:postgres@db:5432/ecommerce
      - JWT_SECRET=devsecret
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    restart: unless-stopped

  api-gateway:
    build: ../services/api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - catalog-service

  catalog-service:
    build: ../services/catalog-service
    ports:
      - "5004:5004"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ecommerce
      - SERVICE_PORT=5004
    depends_on:
      - db
    restart: unless-stopped

  recommendation-service:
    build: ../services/recommendation-service
    ports:
      - "5005:5005"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ecommerce
      - SERVICE_PORT=5005
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - ARTIFACTS_PATH=/artifacts
      - MODEL_VERSION=production_v1
      - LOG_LEVEL=INFO
    volumes:
      - ../notebooks/artifacts:/artifacts:ro
    depends_on:
      - db
      - catalog-service
      - redis
    restart: unless-stopped

  # ---------- DATABASES ----------
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  # ---------- FRONTEND ----------
  frontend:
    build: ../frontend
    ports:
      - "5174:5174"
    depends_on:
      - api-gateway

volumes:
  pgdata:
