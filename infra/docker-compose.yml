services:
  # ---------- BACKEND SERVICES ----------
  user-service:
    build: ../services/user-service
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_URI=postgresql://postgres:postgres@db:5432/ecommerce
      - JWT_SECRET=devsecret
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  product-service:
    build: ../services/product-service
    ports:
      - "5001:5000"
    environment:
      - POSTGRES_URI=postgresql://postgres:postgres@db:5432/ecommerce
    depends_on:
      - db

  api-gateway:
    build: ../services/api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - product-service

  # ---------- DATABASES ----------
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  # ---------- FRONTEND ----------
  frontend:
    build: ../frontend
    ports:
      - "5174:5174"
    depends_on:
      - api-gateway

volumes:
  pgdata:
