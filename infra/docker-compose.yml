services:
  # ---------- BACKEND SERVICES ----------
  user-service:
    build: ../services/user-service
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_URI=postgresql://postgres:postgres@db:5432/ecommerce
      - JWT_SECRET=devsecret
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  product-service:
    build: ../services/product-service
    ports:
      - "5001:5000"
    environment:
      - POSTGRES_URI=postgresql://postgres:postgres@db:5432/ecommerce
    depends_on:
      - db

  api-gateway:
    build: ../services/api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - product-service

  # ---------- DATABASES ----------
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  # ---------- MESSAGE QUEUE ----------
  zookeeper:
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    depends_on:
      - zookeeper

  # ---------- EVENT PROCESSING ----------
  event-service:
    build: ../services/event-service
    ports:
      - "5003:5000"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka

  event-consumer:
    build: ../services/event-consumer
    environment:
      - KAFKA_BROKER=kafka:9092
      - POSTGRES_URI=postgresql://postgres:postgres@db:5432/ecommerce
      - PARQUET_DIR=/data/events_parquet
    volumes:
      - ../notebooks/artifacts/events:/data/events_parquet
    depends_on:
      - kafka
      - db

  # ---------- FRONTEND ----------
  frontend:
    build: ../frontend
    ports:
      - "5174:5174"
    depends_on:
      - api-gateway

volumes:
  pgdata:
