# Synthetic User Behavior Simulator Configuration

# Simulation Settings
simulation:
  random_seed: 42
  num_users: 100
  num_events: 10000
  event_rate: 10  # events per second (live mode only)

# Product Data Source
products:
  # Option 1: Load from local JSON file
  source: "file"  # "file" or "api"
  file_path: "../seed-data/products.json"
  
  # Option 2: Fetch from API
  api_url: "http://localhost:8000/api/products"

# User Personas (category preferences)
personas:
  - name: "tech_enthusiast"
    probability: 0.30
    category_weights:
      electronics: 0.60
      computers: 0.30
      accessories: 0.10
    
  - name: "casual_shopper"
    probability: 0.40
    category_weights:
      electronics: 0.25
      computers: 0.25
      accessories: 0.25
      clothing: 0.25
    
  - name: "bargain_hunter"
    probability: 0.20
    category_weights:
      electronics: 0.20
      computers: 0.20
      accessories: 0.40
      clothing: 0.20
    
  - name: "impulse_buyer"
    probability: 0.10
    category_weights:
      electronics: 0.30
      computers: 0.20
      accessories: 0.30
      clothing: 0.20

# Markov Chain Transition Matrix
# Defines probability of transitioning from one action to another
transitions:
  # From: view
  view:
    view: 0.50      # Continue browsing
    click: 0.30     # Click on product
    add_to_cart: 0.10  # Direct add to cart
    purchase: 0.02  # Impulse buy
    exit: 0.08      # Leave site
  
  # From: click
  click:
    view: 0.30      # Go back to browsing
    click: 0.20     # Click another element
    add_to_cart: 0.35  # Add to cart
    purchase: 0.10  # Direct purchase
    exit: 0.05      # Leave site
  
  # From: add_to_cart
  add_to_cart:
    view: 0.25      # Continue shopping
    click: 0.15     # Check product details
    add_to_cart: 0.20  # Add more items
    purchase: 0.35  # Complete purchase
    exit: 0.05      # Abandon cart
  
  # From: purchase
  purchase:
    view: 0.30      # Browse more
    click: 0.10     # Check recommendations
    add_to_cart: 0.05  # Add another item
    purchase: 0.05  # Buy again
    exit: 0.50      # Leave after purchase

# Session Configuration
session:
  min_duration_seconds: 30
  max_duration_seconds: 1800  # 30 minutes
  avg_time_between_actions: 15  # seconds
  time_variance: 10  # seconds (std deviation)

# Output Configuration
output:
  # Replay mode: write Parquet files
  parquet_dir: "../../notebooks/artifacts/events"
  partition_by_date: true
  
  # Live mode: POST to API
  api_endpoint: "http://localhost:8000/events"
  batch_size: 100
  retry_attempts: 3
  retry_delay: 1  # seconds

# Event Properties
event_properties:
  view:
    - page: ["product_detail", "product_list", "search_results", "homepage"]
    - source: ["search", "category", "homepage", "recommendation"]
    - referrer: ["google", "facebook", "direct", "email"]
  
  click:
    - element: ["buy_button", "add_to_cart", "image", "title", "price", "reviews"]
    - position: ["top", "middle", "bottom", "sidebar"]
  
  add_to_cart:
    - quantity: [1, 2, 3]
    - variant: ["default", "color_red", "color_blue", "size_l", "size_m"]
  
  purchase:
    - payment_method: ["credit_card", "debit_card", "paypal", "apple_pay"]
    - currency: ["USD"]
    - shipping_method: ["standard", "express", "next_day"]

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
